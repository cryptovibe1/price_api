<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Price API Candles</title>
    <style>
      :root {
        --bg: #eef1f7;
        --panel: #ffffff;
        --text: #18212f;
        --muted: #546278;
        --line: #d4dce8;
        --accent: #2f7dd8;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffffff, transparent 45%),
          radial-gradient(circle at 90% 0%, #dfe9ff, transparent 35%),
          var(--bg);
      }

      .wrap {
        position: relative;
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(33, 48, 71, 0.08);
      }

      .controls {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(10, minmax(120px, 1fr));
        padding: 14px;
      }

      .load-top {
        grid-column: 10;
        grid-row: 1;
      }

      .load-top #load {
        padding: 6px 0;
        font-size: 12px;
        min-height: 30px;
      }

      .settings-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 12px 0 12px;
      }

      .settings-head-actions {
        display: flex;
        gap: 8px;
      }

      .settings-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      .settings-toggle {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .settings-side-toggle {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .settings-body.hidden {
        display: none;
      }

      .ma-settings-card {
        position: fixed;
        top: 10px;
        right: 10px;
        width: min(320px, calc(100% - 28px));
        z-index: 5;
      }

      .ma-settings-card.left {
        left: 10px;
        right: auto;
      }

      .ma-settings-body {
        padding: 10px 12px 12px 12px;
      }

      .ma-list {
        display: grid;
        gap: 8px;
      }

      .ma-row {
        display: grid;
        grid-template-columns: 1fr 92px;
        align-items: center;
        gap: 8px;
      }

      .ma-row .check {
        margin-top: 0;
      }

      .ma-row .ma-period {
        margin-top: 0;
      }

      .ma-settings-body label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .ma-settings-body input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 10px;
        font-size: 14px;
        background: #fff;
      }

      .controls label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .controls input,
      .controls select,
      .controls button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 10px;
        font-size: 14px;
        background: #fff;
      }

      .controls button {
        margin-top: 18px;
        background: linear-gradient(180deg, #3e8ce6, #2f7dd8);
        color: #fff;
        border: none;
        font-weight: 600;
        cursor: pointer;
      }

      .controls button.secondary {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 22px;
        font-size: 13px;
        color: var(--text);
      }

      .wide {
        grid-column: span 2;
      }

      .check input {
        width: 20px;
        height: 20px;
        margin: 0;
        accent-color: var(--accent);
      }

      .toggle-btn {
        width: 100%;
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        background: #ffffff;
        cursor: pointer;
      }

      .toggle-btn.active {
        color: #ffffff;
        background: linear-gradient(180deg, #3e8ce6, #2f7dd8);
        border-color: transparent;
      }

      #log-scale {
        display: none;
      }

      .chart {
        margin-top: 12px;
        padding: 12px;
        position: relative;
      }

      #status {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      #hover-info {
        margin-top: 4px;
        font-size: 13px;
        color: #2a3650;
      }

      #hover-tooltip {
        position: absolute;
        display: none;
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 12px;
        color: #fff;
        background: rgba(24, 33, 47, 0.9);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        pointer-events: none;
        z-index: 6;
        white-space: nowrap;
      }

      #cursor-vline {
        position: absolute;
        display: none;
        top: 12px;
        height: min(72vh, 640px);
        width: 1px;
        background: rgba(42, 54, 80, 0.55);
        pointer-events: none;
        z-index: 5;
      }

      #rsi-cursor-vline {
        position: absolute;
        display: none;
        top: 12px;
        width: 1px;
        background: rgba(42, 54, 80, 0.55);
        pointer-events: none;
        z-index: 5;
      }

      #cursor-hline {
        position: absolute;
        display: none;
        left: 0;
        width: 100%;
        height: 1px;
        background: rgba(42, 54, 80, 0.5);
        pointer-events: none;
        z-index: 5;
      }

      #cursor-strip {
        position: relative;
        height: 24px;
        margin-top: 2px;
      }

      #cursor-time-label {
        position: absolute;
        display: none;
        transform: translateX(-50%);
        top: 2px;
        font-size: 12px;
        color: #2a3650;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
        white-space: nowrap;
        pointer-events: none;
      }

      canvas {
        width: 100%;
        height: min(72vh, 640px);
        border-radius: 8px;
      }

      #rsi-chart {
        height: min(36vh, 320px);
      }

      @media (max-width: 980px) {
        .ma-settings-card {
          position: static;
          width: auto;
          margin-bottom: 10px;
        }

        .controls {
          grid-template-columns: repeat(2, minmax(120px, 1fr));
        }

        .wide {
          grid-column: span 2;
        }

        .load-top {
          grid-column: auto;
          grid-row: auto;
        }
      }
    </style>

      <div class="panel">

  <script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
